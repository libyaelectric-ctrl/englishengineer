name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Security Audit
        run: node scripts/security-audit.mjs

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit Tests
        run: npm test

      - name: Test Coverage
        run: npm run test:coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Install Backend
        run: npm --prefix backend ci

      - name: Backend Typecheck
        run: npm --prefix backend run typecheck

      - name: Backend Tests
        run: npm run backend:test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          MAIN_SIZE=$(du -sb dist/assets/*.js | sort -rn | head -1 | awk '{print $1}')
          LIMIT=500000
          if [ "$MAIN_SIZE" -gt "$LIMIT" ]; then
            echo "Main bundle too large: ${MAIN_SIZE} bytes (limit: ${LIMIT})"
            exit 1
          fi
          echo "Bundle size OK: ${MAIN_SIZE} bytes"

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3
