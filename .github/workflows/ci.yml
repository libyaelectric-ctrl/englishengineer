name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Security Audit
        run: node scripts/security-audit.mjs

      - name: Type Check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit Tests
        run: npm test

      - name: Test Coverage
        run: npm run test:coverage

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Install Backend
        run: npm --prefix backend ci

      - name: Backend Typecheck
        run: npm --prefix backend run typecheck

      - name: Backend Tests
        run: npm run backend:test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "=== Bundle Size Budget ==="
          JS_SIZE=$(du -sb dist/assets/*.js | awk '{s+=$1}END{print s}')
          CSS_SIZE=$(du -sb dist/assets/*.css | awk '{s+=$1}END{print s}')
          JS_LIMIT=2000000
          CSS_LIMIT=200000
          echo "JS: ${JS_SIZE} bytes (limit: ${JS_LIMIT})"
          echo "CSS: ${CSS_SIZE} bytes (limit: ${CSS_LIMIT})"
          FAIL=0
          if [ "${JS_SIZE:-0}" -gt "$JS_LIMIT" ]; then
            echo "FAIL: JS bundle too large"
            FAIL=1
          fi
          if [ "${CSS_SIZE:-0}" -gt "$CSS_LIMIT" ]; then
            echo "FAIL: CSS bundle too large"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "Bundle size OK"

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3
