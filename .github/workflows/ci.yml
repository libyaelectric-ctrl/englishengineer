name: EngineerOS CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend
        run: npm ci

      - name: Validate professional content
        run: npm run content:validate

      - name: Typecheck
        run: npm run typecheck

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Complexity check
        run: |
          npm run lint -- --rule '{"complexity": ["error", 15]}' --max-warnings 0 || true

      - name: Duplication check
        run: npx jscpd --min-lines 5 --min-tokens 50 --reporters console --threshold 5 || true

      - name: Accessibility lint
        run: |
          npm run lint -- --rule '{"jsx-a11y/alt-text": "error", "jsx-a11y/anchor-has-content": "error", "jsx-a11y/aria-props": "error", "jsx-a11y/aria-proptypes": "error", "jsx-a11y/aria-role": "error", "jsx-a11y/aria-unsupported-elements": "error", "jsx-a11y/click-events-have-key-events": "error", "jsx-a11y/heading-has-content": "error", "jsx-a11y/img-redundant-alt": "error", "jsx-a11y/label-has-associated-control": "error", "jsx-a11y/no-access-key": "error", "jsx-a11y/no-distracting-elements": "error", "jsx-a11y/no-redundant-roles": "error", "jsx-a11y/role-has-required-aria-props": "error", "jsx-a11y/role-supports-aria-props": "error", "jsx-a11y/scope-is-valid": "error"}' || true

      - name: Unit tests
        run: npm test

      - name: Coverage check
        run: npm run test:coverage

      - name: Production build
        run: npm run build

      - name: Install backend
        run: npm run backend:install

      - name: Backend tests
        run: npm run backend:test

      - name: Security audit
        run: |
          npm audit --audit-level=moderate || true
          npm --prefix backend audit --audit-level=moderate || true

      - name: Static RLS verification
        run: npm run verify:rls

      - name: Kademe 8 safe environment check
        run: npm run kademe8:check

      - name: Lighthouse CI Report
        run: npx lhci autorun || true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: engineeros-dist
          path: dist
          if-no-files-found: error
          retention-days: 7
