name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Format Check
        run: npm run format:check

      - name: Type Check
        run: npm run typecheck

      - name: Validate Content
        run: npm run content:validate

      - name: Lint
        run: npm run lint

      - name: Evidence Consistency Check
        run: node scripts/verify-evidence-consistency.js Faz5.txt docs/faz5-evidence
        continue-on-error: true

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Unit Tests
        run: npm test

      - name: Test Coverage
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Install Backend
        run: npm --prefix backend ci

      - name: Backend Typecheck
        run: npm --prefix backend run typecheck

      - name: Backend Tests
        run: npm run backend:test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  storybook:
    name: Storybook
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Smoke Tests
        run: npm run e2e

      - name: Install Browser
        run: npx playwright install --with-deps chromium

      - name: Browser E2E
        run: npm run e2e:browser
        continue-on-error: true
